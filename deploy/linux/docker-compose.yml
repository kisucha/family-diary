# ============================================================================
# Franklin Family Diary - Linux Server Docker Compose
# MariaDB only — Next.js는 pm2 + next dev 로 직접 실행
# ============================================================================

services:

  mariadb:
    image: mariadb:11.2
    container_name: family-diary-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Pacific/Auckland
    volumes:
      - family-diary-db-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:ro
      - ./mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "127.0.0.1:3306:3306"   # 루프백만 허용 — pm2(Next.js)에서 localhost로 접근
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  family-diary-db-data:
    driver: local
