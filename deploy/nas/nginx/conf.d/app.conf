# ============================================================================
# Franklin Family Diary — Nginx 서버 블록
#
# 두 가지 모드 중 하나를 선택:
#   MODE A: HTTPS (Let's Encrypt / DDNS + 포트포워딩)
#   MODE B: HTTP only (Cloudflare Tunnel 사용 시 — CF가 HTTPS 처리)
#
# 기본은 MODE A (HTTPS). Cloudflare Tunnel 사용 시 MODE B 주석 참고.
# ============================================================================

# ── MODE A: HTTPS ──────────────────────────────────────────────────────────

# HTTP → HTTPS 강제 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name diary.yourdomain.com;    # .env의 DOMAIN_NAME 값과 동일하게

    # Let's Encrypt ACME 챌린지 (인증서 갱신 시 필요)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        allow all;
    }

    # 나머지는 HTTPS로 영구 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name diary.yourdomain.com;

    # ── SSL 인증서 ──────────────────────────────────────────────────────────
    # Let's Encrypt 사용 시: certbot으로 발급 후 아래 경로에 복사
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # 권장 SSL 보안 설정 (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (6개월): HTTPS 강제 (주의: 해제하려면 브라우저 캐시 만료까지 기다려야 함)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ── 헬스체크 엔드포인트 (Nginx 자체) ───────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Next.js 리버스 프록시 ───────────────────────────────────────────────
    location / {
        proxy_pass http://next-app:3000;
        proxy_http_version 1.1;

        # WebSocket 지원 (Supabase Realtime / Next.js HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 실제 클라이언트 IP 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 설정 (Next.js SSR 응답 대기)
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 버퍼링 설정
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
    }

    # ── Next.js 정적 파일 캐싱 최적화 ─────────────────────────────────────
    # /_next/static/ 은 파일명에 해시 포함 → 장기 캐시 가능
    location /_next/static/ {
        proxy_pass http://next-app:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── API 라우트 타임아웃 (긴 작업 고려) ─────────────────────────────────
    location /api/ {
        proxy_pass http://next-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # 무거운 API 호출 여유 시간
    }
}

